<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Registro de Pacientes</title>
    <link rel="stylesheet" href="../../styles/auth.css">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' file: data: blob: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' file: data: blob: https:; style-src 'self' 'unsafe-inline' file: data: https:; img-src 'self' data: blob: file: https:;">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-brand-row"><div class="auth-brand-icon"><svg width="18" height="18" viewBox="0 0 32 32" fill="none"><path d="M9 16.5C9 12.358 12.358 9 16.5 9C20.642 9 24 12.358 24 16.5" stroke="white" stroke-width="2" stroke-linecap="round"/><circle cx="16.5" cy="22" r="3" fill="white"/></svg></div><span class="auth-brand-name">Portal Saúde</span></div><h1>Bem-vindo<br><em>de volta.</em></h1>
            <p class="auth-subtitle">Faça login para continuar</p>

            <form id="loginForm" class="auth-form">
                <label for="username">Usuário</label>
                <input id="username" name="username" type="text" autocomplete="username" required>

                <label for="password">Senha</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>

                <button type="submit">Entrar</button>
            </form>

            <p id="loginMessage" class="auth-message">Use suas credenciais de acesso.</p>
        </section>
    </main>

    <script src="../../scripts/auth/login.js"></script>
</body>
</html>
